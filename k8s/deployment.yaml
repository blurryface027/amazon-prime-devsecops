apiVersion: apps/v1
kind: Deployment

metadata:
  name: prime-video
  labels:
    app: prime-video

spec:
  replicas: 2

  selector:
    matchLabels:
      app: prime-video

  template:
    metadata:
      labels:
        app: prime-video

    spec:
      containers:
      - name: prime-video
        image: blurryface027/prime-video-devsecops:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80